<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>국가기술자격 합격률 현황 | 다산에듀 교육연구소</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --white:#fff;--bg:#f5f6f8;--bg2:#eef0f4;
  --border:#e2e5eb;--border-light:#f0f2f5;
  --text:#1a1d23;--text-sub:#4a5068;--text-muted:#8b92a8;
  --dasan:#0091db;--dasan-dark:#0071aa;--dasan-light:#33b3f0;
  --brand:#1a3a6b;--brand-mid:#2952a3;--brand-light:#4a7fd4;--brand-pale:#edf2fb;
  --accent:#e8412e;--green:#1a9e5e;
  --pbt:#2952a3;--cbt:#e8412e;--all:#6b4fd4;
  --shadow-sm:0 1px 4px rgba(0,0,0,.06);
  --r:12px;--sidebar:264px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* NAV */
.topnav{background:linear-gradient(135deg,var(--dasan-dark) 0%,var(--dasan) 60%,var(--dasan-light) 100%);flex-shrink:0;box-shadow:0 2px 12px rgba(0,100,180,.3)}
.topnav-inner{padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.brand-badge{width:28px;height:28px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px}
.brand-name{font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;color:#fff;letter-spacing:-.2px}
.brand-sub{font-size:9px;color:rgba(255,255,255,.75);letter-spacing:.3px;font-weight:400}
.nav-center{display:flex;align-items:center;gap:8px;flex:1;justify-content:center}
.nav-badge{font-size:10px;color:rgba(255,255,255,.9);background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);padding:2px 8px;border-radius:10px}
.nav-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.nav-src{font-size:10px;color:rgba(255,255,255,.85);background:rgba(255,255,255,.15);padding:3px 8px;border-radius:16px;border:1px solid rgba(255,255,255,.25)}
.nav-btn{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:16px;border:1.5px solid rgba(255,255,255,.4);background:rgba(255,255,255,.15);color:#fff;font-size:10px;font-weight:600;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s}
.nav-btn:hover{background:rgba(255,255,255,.3)}
.nav-btn.copied{background:var(--green);border-color:var(--green)}

/* TAB */
.tab-bar{background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0;display:flex;padding:0 16px}
.tab-btn{padding:10px 18px;font-size:12px;font-weight:600;font-family:'Noto Sans KR',sans-serif;border:none;background:transparent;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab-btn.active{color:var(--dasan);border-bottom-color:var(--dasan)}

/* LAYOUT */
.main-wrap{display:flex;flex:1;overflow:hidden}
.sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;flex-shrink:0}
.sidebar-section{padding:14px 14px 0}
.sidebar-label{font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:.6px;text-transform:uppercase;margin-bottom:7px}
.sidebar-divider{height:1px;background:var(--border-light);margin:12px 0}
.cat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.cat-label{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase}
.cat-actions{display:flex;gap:4px}
.cat-act-btn{font-size:9px;color:var(--dasan);background:none;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:600;padding:0;text-decoration:underline}

/* 종목 체크박스 */
.name-list{display:flex;flex-direction:column;gap:1px}
.name-item{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:7px;cursor:pointer;transition:background .12s;user-select:none}
.name-item:hover{background:var(--bg)}
.name-item.active{background:#e8f5fb}
.name-check{width:15px;height:15px;border:1.5px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s;background:#fff}
.name-item.active .name-check{background:var(--dasan);border-color:var(--dasan)}
.chk-icon{color:#fff;font-size:10px;display:none}
.name-item.active .chk-icon{display:block}
.name-text{font-size:12px;color:var(--text-sub);font-weight:500}
.name-item.active .name-text{color:var(--dasan-dark);font-weight:600}

/* 유형 탭 */
.type-tabs{display:flex;gap:3px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:3px}
.ttab{flex:1;padding:5px 0;font-size:11px;font-family:'Noto Sans KR',sans-serif;font-weight:600;border:none;background:transparent;border-radius:7px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:3px;color:var(--text-muted)}
.ttab.active.all{background:#fff;color:var(--all);box-shadow:var(--shadow-sm)}
.ttab.active.pbt{background:#fff;color:var(--pbt);box-shadow:var(--shadow-sm)}
.ttab.active.cbt{background:#fff;color:var(--cbt);box-shadow:var(--shadow-sm)}
.ttab-dot{width:6px;height:6px;border-radius:50%}
.ttab.active.all .ttab-dot{background:var(--all)}
.ttab.active.pbt .ttab-dot{background:var(--pbt)}
.ttab.active.cbt .ttab-dot{background:var(--cbt)}
.type-info{font-size:9px;color:var(--text-muted);margin-top:4px;line-height:1.5}

/* 슬라이더 */
.slider-wrap{position:relative;padding:0 2px}
.range-track{position:relative;height:6px;background:var(--bg2);border-radius:3px;border:1px solid var(--border)}
.range-fill{position:absolute;top:0;height:100%;border-radius:3px;pointer-events:none;background:var(--dasan);opacity:.3}
.range-input{position:absolute;top:50%;transform:translateY(-50%);width:100%;appearance:none;-webkit-appearance:none;background:transparent;outline:none;pointer-events:none}
.range-input::-webkit-slider-thumb{appearance:none;width:16px;height:16px;border-radius:50%;background:var(--dasan);border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2);cursor:pointer;pointer-events:all}
.year-display{display:flex;justify-content:space-between;font-size:11px;font-weight:700;color:var(--dasan);margin-bottom:7px}
.year-ticks{display:flex;justify-content:space-between;margin-top:4px}
.year-tick{font-size:9px;color:var(--text-muted)}

/* select */
.round-selects{display:flex;flex-direction:column;gap:6px}
.round-select{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:7px;font-size:12px;font-family:'Noto Sans KR',sans-serif;color:var(--text);background:#fff;outline:none;cursor:pointer}
.round-select:focus{border-color:var(--dasan)}

/* 뷰 토글 */
.vtoggle{display:flex;gap:2px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:3px}
.vbtn{flex:1;padding:5px 0;font-size:11px;font-family:'Noto Sans KR',sans-serif;font-weight:500;border:none;background:transparent;color:var(--text-muted);border-radius:6px;cursor:pointer;transition:all .15s}
.vbtn.active{background:#fff;color:var(--dasan);font-weight:700;box-shadow:var(--shadow-sm)}
.sidebar-bottom{padding:12px 14px;border-top:1px solid var(--border-light)}
.view-label{font-size:11px;color:var(--text-muted);margin-bottom:6px;min-height:18px}
.view-label strong{color:var(--dasan-dark)}

/* 콘텐츠 */
.content-area{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px;display:flex;flex-direction:column;gap:12px;min-width:0}

/* KPI 카드 한줄 */
.kpi-grid{display:flex;gap:10px;flex-wrap:nowrap}
.kpi-card{flex:1;min-width:0;background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kc-blue::before{background:linear-gradient(90deg,var(--dasan),var(--dasan-light))}
.kc-red::before{background:linear-gradient(90deg,var(--accent),#f4967e)}
.kc-green::before{background:linear-gradient(90deg,var(--green),#52d19a)}
.kpi-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 6px;border-radius:8px;margin-bottom:3px}
.kb-all{background:#f0edff;color:var(--all)}
.kb-pbt{background:#edf2fb;color:var(--pbt)}
.kb-cbt{background:#fff0ee;color:var(--cbt)}
.kpi-label{font-size:10px;color:var(--text-muted);font-weight:500;margin-bottom:1px}
.kpi-value{font-size:18px;font-weight:800;letter-spacing:-1px;line-height:1;margin-bottom:2px}
.kc-blue .kpi-value{color:var(--dasan)}
.kc-red .kpi-value{color:var(--accent)}
.kc-green .kpi-value{color:var(--green)}
.kpi-sub{font-size:10px;color:var(--text-muted)}

/* 차트 */
.chart-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow-sm)}
.chart-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0}
.chart-title{font-size:13px;font-weight:700;color:var(--text)}
.chart-desc{font-size:10px;color:var(--text-muted);margin-top:1px}
.chart-wrap{position:relative;height:220px;margin-top:10px}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:7px}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-muted)}
.l-bar{width:10px;height:8px;border-radius:2px}
.l-line{width:16px;height:3px;border-radius:2px}
.save-btn{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--text-sub);font-size:10px;font-weight:600;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.save-btn:hover{background:var(--dasan);color:#fff;border-color:var(--dasan)}

/* 회차별합격률 캡처영역 */
.capture-wrap{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--shadow-sm)}
.capture-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:2.5px solid var(--dasan)}
.capture-title{font-size:16px;font-weight:800;color:var(--brand);letter-spacing:-.3px}
.capture-subtitle{font-size:11px;color:var(--text-muted);margin-top:3px}
.capture-brand-name{font-size:12px;font-weight:700;color:var(--dasan);text-align:right}
.capture-brand-sub{font-size:9px;color:var(--text-muted);text-align:right;margin-top:2px}
.round-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.round-card{border:1px solid var(--border);border-radius:10px;padding:14px;position:relative;overflow:hidden;background:#fff}
.round-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--dasan),var(--dasan-light))}
.rc-name{font-size:14px;font-weight:700;color:var(--brand);margin-bottom:10px}
.rc-block-w{background:#edf5fc;border-radius:8px;padding:10px;margin-bottom:8px}
.rc-block-p{background:#edf7f2;border-radius:8px;padding:10px}
.rc-block-title{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.rc-block-label{font-size:13px;font-weight:700;color:#0071aa}
.rc-block-label-p{font-size:13px;font-weight:700;color:#0f6e56}
.rc-type{font-size:10px;font-weight:700;padding:1px 7px;border-radius:6px}
.rc-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.rc-label{font-size:11px;color:var(--text-muted)}
.rc-val{font-size:11px;font-weight:600;color:var(--text)}
.rc-divider-w{border-top:0.5px solid #c5dff0;padding-top:8px;margin-top:8px}
.rc-divider-p{border-top:0.5px solid #b0ddc8;padding-top:8px;margin-top:8px}
.rc-rate-w{font-size:24px;font-weight:800;color:#0091db}
.rc-rate-p{font-size:24px;font-weight:800;color:#1a9e5e}
.rc-no-data{color:var(--text-muted);font-size:11px;text-align:center;padding:12px 0}
.capture-footer{margin-top:14px;padding-top:10px;border-top:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:center}
.capture-footer-txt{font-size:10px;color:var(--text-muted)}
.capture-btn{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;border:none;background:var(--dasan);color:#fff;font-size:11px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s}
.capture-btn:hover{background:var(--dasan-dark)}
.capture-btn:disabled{opacity:.6;cursor:not-allowed}

/* EMPTY */
.empty{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:48px 24px;text-align:center;box-shadow:var(--shadow-sm);flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.empty-icon{font-size:40px;margin-bottom:10px;opacity:.4}
.empty-title{font-size:14px;font-weight:700;color:var(--text-sub);margin-bottom:5px}
.empty-desc{font-size:12px;color:var(--text-muted);line-height:1.6;white-space:pre-line}

/* FOOTER */
.footer{border-top:1px solid var(--border);background:#fff;padding:10px 16px;flex-shrink:0}
.footer-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.footer-brand{font-size:11px;font-weight:700;color:var(--dasan)}
.footer-copy{font-size:10px;color:var(--text-muted)}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .3s ease both}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){
  body{height:auto;overflow:auto}
  .main-wrap{flex-direction:column;overflow:visible}
  .sidebar{width:100%;min-width:unset;border-right:none;border-bottom:1px solid var(--border);overflow:visible;height:auto}
  .content-area{overflow:visible;height:auto}
  .kpi-grid{flex-wrap:wrap}
  .kpi-card{min-width:calc(50% - 5px)}
  .nav-center{display:none}
  .round-cards{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-inner">
    <div class="brand">
      <div class="brand-badge">📘</div>
      <div>
        <div class="brand-name">다산에듀 교육연구소</div>
        <div class="brand-sub">국가기술자격 합격률 데이터</div>
      </div>
    </div>
    <div class="nav-center">
      <span style="font-size:13px;font-weight:700;color:#fff;letter-spacing:-.2px">국가기술자격 합격률 현황</span>
      <span class="nav-badge">PBT · CBT</span>
      <span class="nav-badge" id="navDateBadge">📊 최신 데이터</span>
    </div>
    <div class="nav-right">
      <div class="nav-src">출처 · 한국산업인력공단</div>
      <button id="copyBtn" class="nav-btn" onclick="copyURL()">🔗 <span>링크 복사</span></button>
    </div>
  </div>
</nav>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('chart')">📊 합격률 차트</button>
  <button class="tab-btn" onclick="switchTab('round')">📋 회차별 합격률</button>
</div>

<div class="main-wrap">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">종목 선택</div>
      <div id="chipArea"><div style="color:var(--text-muted);font-size:11px;padding:6px 0">로딩 중...</div></div>
    </div>

    <!-- 합격률차트 탭 -->
    <div id="sidebarChart">
      <div class="sidebar-section">
        <div class="sidebar-divider"></div>
        <div class="sidebar-label">시험 유형</div>
        <div class="type-tabs">
          <button class="ttab all active" onclick="setType('all')"><span class="ttab-dot"></span>전체</button>
          <button class="ttab pbt" onclick="setType('PBT')"><span class="ttab-dot"></span>PBT</button>
          <button class="ttab cbt" onclick="setType('CBT')"><span class="ttab-dot"></span>CBT</button>
        </div>
        <div class="type-info" id="typeInfo"></div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-divider"></div>
        <div class="sidebar-label">기간 설정</div>
        <div class="year-display">
          <span id="yrFrom">2001</span>
          <span style="color:var(--text-muted);font-weight:300">—</span>
          <span id="yrTo">2026</span>
        </div>
        <div class="slider-wrap">
          <div class="range-track">
            <div class="range-fill" id="rangeFill" style="left:0%;right:0%"></div>
            <input type="range" class="range-input" id="sliderFrom" min="0" max="25" value="0" oninput="onSlider()">
            <input type="range" class="range-input" id="sliderTo" min="0" max="25" value="25" oninput="onSlider()">
          </div>
        </div>
        <div class="year-ticks">
          <span class="year-tick">2001</span>
          <span class="year-tick">2008</span>
          <span class="year-tick">2015</span>
          <span class="year-tick">2026</span>
        </div>
      </div>
      <div class="sidebar-bottom">
        <div class="view-label" id="viewLabel">종목을 선택하세요</div>
        <div class="vtoggle">
          <button class="vbtn active" onclick="setView('year')">연도별</button>
          <button class="vbtn" onclick="setView('round')">회차별</button>
        </div>
      </div>
    </div>

    <!-- 회차별합격률 탭 -->
    <div id="sidebarRound" style="display:none">
      <div class="sidebar-section">
        <div class="sidebar-divider"></div>
        <div class="sidebar-label">연도 · 회차 선택</div>
        <div class="round-selects">
          <select class="round-select" id="selYear" onchange="onYearSelect()">
            <option value="">연도 선택</option>
          </select>
          <select class="round-select" id="selRound">
            <option value="">회차 선택</option>
          </select>
        </div>
        <button id="searchBtn" onclick="onSearchClick()" style="margin-top:10px;width:100%;padding:9px;border-radius:8px;border:none;background:#0091db;color:#fff;font-size:12px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer">조회하기</button>
      </div>
      <div class="sidebar-bottom">
        <div class="view-label" id="roundLabel" style="font-size:11px;color:var(--text-muted)">종목 선택 후 연도·회차를 고르세요</div>
      </div>
    </div>
  </div>

  <div class="content-area" id="contentArea">
    <div class="empty anim">
      <div class="empty-icon" style="animation:spin 1s linear infinite">⏳</div>
      <div class="empty-title">데이터 불러오는 중...</div>
      <div class="empty-desc">구글 시트에서 최신 데이터를 가져오고 있어요</div>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-brand">다산에듀 교육연구소</div>
    <div class="footer-copy">© 2025 다산에듀 교육연구소 · 데이터 출처: 한국산업인력공단 · 무단 전재 및 재배포 금지</div>
  </div>
</footer>

const COL={wa:5,wp:6,pa:8,pp:9,note:11};
const CATS={
  '(산업)기사':['전기기사','전기산업기사','전기공사기사','전기공사산업기사','소방설비기사(전기)','소방설비기사(기계)','소방설비산업기사(전기)','소방설비산업기사(기계)'],
  '기능사':['전기기능사'],
  '기능장':['전기기능장'],
};

let RAW=[],YEARS=[];
let selectedNames=new Set();
let selectedType='all',viewMode='year',currentTab='chart';
let fromIdx=0,toIdx=0;
let chartLine=null,chartBar=null;

// 빈셀/'-'/'#DIV/0!' → null(미시행), 숫자 → 숫자(0 포함)
function pN(v){
  const s=String(v??'').replace(/[, ]/g,'').trim();
  if(!s||s==='-'||s.startsWith('#')) return null;
  const n=parseFloat(s);
  return isNaN(n)?null:n;
}
function pY(v){return String(v||'').replace('년','').trim();}
function fmt(n){if(!n)return'0';if(n>=10000)return(n/10000).toFixed(1)+'만';if(n>=1000)return(n/1000).toFixed(1)+'천';return n.toLocaleString();}

async function fetchSheet(s){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/'${s.name}'?key=${API_KEY}`;
  const res=await fetch(url);
  if(!res.ok){const e=await res.json();throw new Error(e.error?.message||res.status);}
  const json=await res.json();
  const rows=json.values||[];
  const result=[];
  for(let i=1;i<rows.length;i++){
    const c=rows[i];
    if(!c[0]||c[0]==='-') continue;
    const wa=pN(c[COL.wa]),wp=pN(c[COL.wp]);
    const pa=pN(c[COL.pa]),pp=pN(c[COL.pp]);
    const note=(c[COL.note]||'').trim();
    // wa/pa가 null이면 미시행(차트 끊김), 0이면 0% 표시
    const writtenRate=wa===null?null:(wa>0?+((wp/wa)*100).toFixed(1):0);
    const practicalRate=pa===null?null:(pa>0?+((pp/pa)*100).toFixed(1):0);
    result.push({
      category:s.category,name:c[0].trim(),
      year:pY(c[1]),round:(c[2]||'').trim(),type:(c[3]||'PBT').trim(),
      written_applicants:wa,written_passed:wp,written_rate:writtenRate,
      practical_applicants:pa,practical_passed:pp,practical_rate:practicalRate,
      note,
    });
  }
  return result;
}

async function loadData(){
  try{
    const results=await Promise.all(SHEET_DEFS.map(s=>fetchSheet(s)));
    RAW=results.flat().filter(d=>d.name);
    YEARS=[...new Set(RAW.map(d=>d.year))].sort();
    toIdx=YEARS.length-1;
    const maxIdx=YEARS.length-1;
    document.getElementById('sliderFrom').max=maxIdx;
    document.getElementById('sliderTo').max=maxIdx;
    document.getElementById('sliderTo').value=maxIdx;
    document.getElementById('navDateBadge').textContent=`📊 ${YEARS[maxIdx]}년 포함`;
    buildChips();
    buildYearSelect();
    onSlider();
    showEmpty();
  }catch(e){
    console.error(e);
    document.getElementById('contentArea').innerHTML=`
      <div class="empty anim">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">데이터 로드 실패</div>
        <div class="empty-desc">Google Sheets API 활성화 여부를 확인해주세요.\n${e.message}</div>
      </div>`;
  }
}

function showEmpty(){
  const msg=currentTab==='chart'
    ?'종목을 선택하면 합격률 차트가 표시됩니다.'
    :'종목 선택 후 연도·회차를 고르면\n합격률 카드가 표시됩니다.';
  document.getElementById('contentArea').innerHTML=`
    <div class="empty anim">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">종목을 선택해 주세요</div>
      <div class="empty-desc">${msg}</div>
    </div>`;
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&tab==='chart')||(i===1&&tab==='round')));
  document.getElementById('sidebarChart').style.display=tab==='chart'?'block':'none';
  document.getElementById('sidebarRound').style.display=tab==='round'?'block':'none';

  // 탭 전환 시 선택 초기화
  selectedNames.clear();
  refreshChipUI();
  document.getElementById('typeInfo').textContent='';
  document.getElementById('viewLabel').textContent='종목을 선택하세요';
  document.getElementById('roundLabel').textContent='종목 선택 후 연도·회차를 고르세요';

  showEmpty();
}

// 종목 목록 (체크박스 + 전체선택/해제)
function buildChips(){
  const area=document.getElementById('chipArea');
  area.innerHTML=Object.entries(CATS).map(([cat,names])=>{
    const exist=names.filter(n=>RAW.some(d=>d.name===n));
    if(!exist.length) return '';
    const catId=cat.replace(/[()]/g,'');
    return `<div style="margin-bottom:10px">
      <div class="cat-header">
        <div class="cat-label">${cat}</div>
        <div class="cat-actions">
          <button class="cat-act-btn" onclick="selectAllCat('${cat}',true)">전체선택</button>
          <span style="color:var(--border);font-size:9px">|</span>
          <button class="cat-act-btn" onclick="selectAllCat('${cat}',false)">해제</button>
        </div>
      </div>
      <div class="name-list">${exist.map(n=>`
        <div class="name-item" data-name="${n}" data-cat="${cat}" onclick="toggleName('${n}')">
          <div class="name-check"><span class="chk-icon">✓</span></div>
          <span class="name-text">${n}</span>
        </div>`).join('')}</div>
    </div>`;
  }).join('');
}

function selectAllCat(cat, select){
  const allNames=CATS[cat].filter(n=>RAW.some(d=>d.name===n));
  if(currentTab==='chart'){
    // 합격률차트는 단일선택 유지
    if(select && allNames.length>0){selectedNames.clear();selectedNames.add(allNames[0]);}
    else allNames.forEach(n=>selectedNames.delete(n));
  } else {
    if(select) allNames.forEach(n=>selectedNames.add(n));
    else allNames.forEach(n=>selectedNames.delete(n));
  }
  refreshChipUI();
  updateTypeInfo();
  if(currentTab==='chart') updateViewLabel();
  else updateRoundLabel();
  render();
}

function toggleName(name){
  if(currentTab==='chart'){
    // 합격률차트: 단일 선택
    selectedNames.clear();
    // 이미 선택된 거 클릭하면 해제
    // (단순히 clear 후 add)
    selectedNames.add(name);
  } else {
    if(selectedNames.has(name)) selectedNames.delete(name);
    else selectedNames.add(name);
  }
  refreshChipUI();
  updateTypeInfo();
  if(currentTab==='chart') updateViewLabel();
  else { updateRoundLabel(); updateRoundOptions(); }
  render();
}

function refreshChipUI(){
  document.querySelectorAll('.name-item').forEach(el=>{
    const n=el.dataset.name;
    el.classList.toggle('active',selectedNames.has(n));
  });
}

function updateViewLabel(){
  const vl=document.getElementById('viewLabel');
  if(selectedNames.size===0){vl.textContent='종목을 선택하세요';return;}
  const n=[...selectedNames][0];
  const typeLabel=selectedType==='all'?'전체':selectedType;
  vl.innerHTML=`<strong>${n}</strong> <span style="background:${selectedType==='PBT'?'#edf2fb':selectedType==='CBT'?'#fff0ee':'#f0edff'};color:${selectedType==='PBT'?'var(--pbt)':selectedType==='CBT'?'var(--cbt)':'var(--all)'};padding:1px 7px;border-radius:8px;font-size:10px;font-weight:700">${typeLabel}</span>`;
}

function updateRoundLabel(){
  const rl=document.getElementById('roundLabel');
  if(selectedNames.size===0){rl.textContent='종목 선택 후 연도·회차를 고르세요';return;}
  const yr=document.getElementById('selYear').value;
  const rd=document.getElementById('selRound').value;
  if(yr&&rd){
    const rdLabel=rd==='all'?'연간 전체':rd;
    rl.innerHTML=`<strong>${yr}년 ${rdLabel}</strong> · ${selectedNames.size}개 종목`;
  } else {
    rl.textContent=`${selectedNames.size}개 종목 선택됨`;
  }
}

function setType(t){
  selectedType=t;
  document.querySelectorAll('.ttab').forEach(b=>{
    b.classList.remove('active');
    if((t==='all'&&b.classList.contains('all'))||(t==='PBT'&&b.classList.contains('pbt'))||(t==='CBT'&&b.classList.contains('cbt')))
      b.classList.add('active');
  });
  updateTypeInfo();
  if(selectedNames.size>0&&currentTab==='chart') render();
}

function updateTypeInfo(){
  if(selectedNames.size===0){document.getElementById('typeInfo').textContent='';return;}
  const n=[...selectedNames][0];
  const rows=RAW.filter(d=>d.name===n);
  const py=[...new Set(rows.filter(d=>d.type==='PBT').map(d=>d.year))].sort();
  const cy=[...new Set(rows.filter(d=>d.type==='CBT').map(d=>d.year))].sort();
  let txt='';
  if(py.length) txt+=`PBT: ${py[0]}~${py[py.length-1]}`;
  if(cy.length) txt+=(txt?' · ':'')+`CBT: ${cy[0]}~${cy[cy.length-1]}`;
  document.getElementById('typeInfo').textContent=txt;
}

function onSlider(){
  let f=parseInt(document.getElementById('sliderFrom').value);
  let t=parseInt(document.getElementById('sliderTo').value);
  if(f>t){[f,t]=[t,f];}
  fromIdx=f;toIdx=t;
  if(!YEARS.length) return;
  const maxI=YEARS.length-1;
  const fy=YEARS[Math.min(f,maxI)],ty=YEARS[Math.min(t,maxI)];
  document.getElementById('yrFrom').textContent=fy;
  document.getElementById('yrTo').textContent=ty;
  const pf=(f/Math.max(maxI,1))*100,pt=(t/Math.max(maxI,1))*100;
  document.getElementById('rangeFill').style.left=pf+'%';
  document.getElementById('rangeFill').style.right=(100-pt)+'%';
  if(selectedNames.size>0&&currentTab==='chart') render();
}

function setView(mode){
  viewMode=mode;
  document.querySelectorAll('.vbtn').forEach((b,i)=>b.classList.toggle('active',(i===0&&mode==='year')||(i===1&&mode==='round')));
  if(selectedNames.size>0&&currentTab==='chart') render();
}

// 연도 select 구성
function buildYearSelect(){
  const sel=document.getElementById('selYear');
  sel.innerHTML='<option value="">연도 선택</option>';
  [...YEARS].reverse().forEach(y=>{
    const o=document.createElement('option');
    o.value=y;o.textContent=y+'년';
    sel.appendChild(o);
  });
}

function updateRoundOptions(){
  const yr=document.getElementById('selYear').value;
  const rdSel=document.getElementById('selRound');
  rdSel.innerHTML='<option value="">회차 선택</option>';
  if(yr){
    const names=selectedNames.size>0?[...selectedNames]:Object.values(CATS).flat();
    const rounds=[...new Set(RAW.filter(d=>d.year===yr&&names.some(n=>d.name===n)).map(d=>d.round))].sort();
    const allOpt=document.createElement('option');
    allOpt.value='all';allOpt.textContent=`${yr}년 전체 (연간 합산)`;
    rdSel.appendChild(allOpt);
    rounds.forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=r;rdSel.appendChild(o);});
  }
}

function onYearSelect(){
  // 연도 바뀌면 회차 초기화
  updateRoundOptions();
  document.getElementById('roundLabel').textContent=
    selectedNames.size>0?`${selectedNames.size}개 종목 선택됨`:'종목 선택 후 연도·회차를 고르세요';
  // 콘텐츠도 초기화
  showEmpty();
}

function onSearchClick(){
  const yr=document.getElementById('selYear').value;
  const rd=document.getElementById('selRound').value;
  if(!selectedNames.size){
    alert('종목을 선택해주세요.');return;
  }
  if(!yr){
    alert('연도를 선택해주세요.');return;
  }
  if(!rd){
    alert('회차를 선택해주세요.');return;
  }
  updateRoundLabel();
  renderRound();
}

function render(){
  if(currentTab==='chart') renderChart();
  else renderRound();
}

// ── 합격률 차트 ──────────────────────────────────────────────
function renderChart(){
  if(selectedNames.size===0){showEmpty();return;}
  const name=[...selectedNames][0];
  const maxI=YEARS.length-1;
  const fromY=YEARS[Math.min(fromIdx,maxI)],toY=YEARS[Math.min(toIdx,maxI)];
  let data=RAW.filter(d=>d.name===name&&d.year>=fromY&&d.year<=toY);
  if(selectedType!=='all') data=data.filter(d=>d.type===selectedType);
  updateViewLabel();

  if(!data.length){
    document.getElementById('contentArea').innerHTML=`<div class="empty anim"><div class="empty-icon">📭</div><div class="empty-title">해당 조건에 데이터가 없습니다</div><div class="empty-desc">기간 또는 시험 유형을 조정해 주세요.</div></div>`;
    return;
  }

  const pts=viewMode==='year'
    ?aggByYear(data)
    :data.map(d=>({...d,
        wa:d.written_applicants,wp:d.written_passed,
        pa:d.practical_applicants,pp:d.practical_passed,
        label:`'${d.year.slice(2)}-${d.round}`}));

        <div class="kpi-sub">합격 ${fmt(tPP)}명</div>
      </div>
      <div class="kpi-card kc-green">
        <div class="kpi-badge" style="background:#f0f5f0;color:#1a9e5e">실기</div>
        <div class="kpi-label">평균 합격률</div>
        <div class="kpi-value">${aPR}%</div>
        <div class="kpi-sub">전체 기간 평균</div>
      </div>
    </div>
    <div class="chart-card anim">
      <div class="chart-card-header">
        <div><div class="chart-title">합격률 추이</div><div class="chart-desc">필기·실기 합격률 (%)</div></div>
      </div>

      <div class="legend">
        <div class="li"><div class="l-line" style="background:#0091db"></div>필기 합격률</div>

function aggByYear(data){
  const map={};
  data.forEach(d=>{
    if(!map[d.year]) map[d.year]={year:d.year,wa:null,wp:null,pa:null,pp:null,note:''};
    // null이면 미시행 - 같은 연도 다른 회차에 값 있으면 그걸 씀
    if(d.written_applicants!==null){
      map[d.year].wa=(map[d.year].wa||0)+d.written_applicants;
      map[d.year].wp=(map[d.year].wp||0)+(d.written_passed||0);
    }
    if(d.practical_applicants!==null){
      map[d.year].pa=(map[d.year].pa||0)+d.practical_applicants;
      map[d.year].pp=(map[d.year].pp||0)+(d.practical_passed||0);
    }
    if(d.note) map[d.year].note=(map[d.year].note?map[d.year].note+' / ':'')+d.note;
  });
  return Object.values(map).sort((a,b)=>a.year.localeCompare(b.year)).map(d=>({
    ...d,
    written_rate:d.wa===null?null:(d.wa>0?+((d.wp/d.wa)*100).toFixed(1):0),
    practical_rate:d.pa===null?null:(d.pa>0?+((d.pp/d.pa)*100).toFixed(1):0),
    label:d.year
  }));
}

function copyURL(){
  const btn=document.getElementById('copyBtn');
  navigator.clipboard.writeText(window.location.href).catch(()=>{
    const t=document.createElement('textarea');
    t.value=window.location.href;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);
  });
  btn.classList.add('copied');btn.querySelector('span').textContent='복사됨!';
  setTimeout(()=>{btn.classList.remove('copied');btn.querySelector('span').textContent='링크 복사';},2000);
}
